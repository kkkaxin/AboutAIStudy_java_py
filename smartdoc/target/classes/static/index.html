<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDoc - AI知识库问答系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">SmartDoc</span>
            </div>
            <div class="header-info">AI知识库问答系统</div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧导航 -->
            <aside class="sidebar">
                <div class="sidebar-title">文档管理</div>
                <div class="upload-section">
                    <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md,.docx" hidden>
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        <span>+</span> 上传文档
                    </button>
                </div>
                <div class="document-list" id="documentList">
                    <div class="document-item empty">暂无文档</div>
                </div>
            </aside>

            <!-- 右侧聊天区 -->
            <div class="chat-area">
                <!-- 聊天消息列表 -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="avatar bot">🤖</div>
                        <div class="message-content">
                            <div class="message-text">
                                您好！我是 SmartDoc 智能助手。请上传文档，我可以帮您解答相关问题。
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 输入区 -->
                <div class="chat-input">
                    <input type="text" id="questionInput" placeholder="输入您的问题..." onkeydown="if(event.keyCode===13) sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">
                        <span>发送</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
