<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartApproval - AI智能审批系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginPage" class="page">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">⚡</div>
                <h1>SmartApproval</h1>
                <p>AI 智能审批系统</p>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">登录</button>
                <button class="tab" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
                <input type="text" id="loginUsername" placeholder="用户名" required>
                <input type="password" id="loginPassword" placeholder="密码" required>
                <button type="submit" class="btn-primary">登 录</button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="login-form" style="display:none" onsubmit="handleRegister(event)">
                <input type="text" id="regUsername" placeholder="用户名" required>
                <input type="password" id="regPassword" placeholder="密码" required>
                <input type="text" id="regRealName" placeholder="真实姓名" required>
                <input type="text" id="regDept" placeholder="部门(如: 技术部)" value="技术部">
                <select id="regRole">
                    <option value="EMPLOYEE">普通员工</option>
                    <option value="MANAGER">部门经理</option>
                    <option value="DIRECTOR">总监</option>
                </select>
                <button type="submit" class="btn-primary">注 册</button>
            </form>

            <div class="login-hint">
                💡 测试账号: zhangsan / 123456 (员工)<br>
                💡 审批账号: lisi / 123456 (经理) | wangwu / 123456 (总监)
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainPage" class="page" style="display:none">
        <header class="topbar">
            <div class="topbar-left">
                <span class="logo-small">⚡</span>
                <h2>SmartApproval</h2>
                <nav>
                    <a href="#" class="nav-link active" onclick="showSection('submit')">提交申请</a>
                    <a href="#" class="nav-link" onclick="showSection('pending')">待审批</a>
                    <a href="#" class="nav-link" onclick="showSection('myRequests')">我的申请</a>
                </nav>
            </div>
            <div class="topbar-right">
                <span id="userInfo"></span>
                <button class="btn-outline" onclick="logout()">退出</button>
            </div>
        </header>

        <main class="content">
            <!-- 提交申请 -->
            <section id="section-submit" class="section">
                <div class="card">
                    <h3>📝 提交审批申请</h3>
                    <p class="subtitle">
                        AI 将自动分析申请内容，结合企业政策、部门预算、历史记录给出审批建议
                    </p>
                    <form id="approvalForm" onsubmit="handleSubmit(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>审批类型 *</label>
                                <select id="submitType" required>
                                    <option value="">请选择</option>
                                    <option value="EXPENSE">💰 费用报销</option>
                                    <option value="LEAVE">🏖️ 请假申请</option>
                                    <option value="PURCHASE">🛒 采购申请</option>
                                    <option value="TRAVEL">✈️ 出差申请</option>
                                    <option value="OVERTIME">⏰ 加班申请</option>
                                    <option value="CONTRACT">📄 合同审批</option>
                                    <option value="BUDGET">📊 预算调整</option>
                                    <option value="OTHER">📌 其他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>涉及金额 (元)</label>
                                <input type="number" id="submitAmount" placeholder="0.00" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>标题 *</label>
                            <input type="text" id="submitTitle" placeholder="如: 2024年Q2差旅费报销" required>
                        </div>
                        <div class="form-group">
                            <label>申请内容 *</label>
                            <textarea id="submitContent" rows="4" placeholder="详细描述申请事由、用途、必要性等..." required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">
                            🤖 提交并触发 AI 分析
                        </button>
                    </form>
                </div>

                <!-- AI 分析结果面板 -->
                <div id="aiResultPanel" class="card ai-panel" style="display:none">
                    <h3>🤖 AI 审批分析结果</h3>
                    <div class="ai-risk-badge" id="aiRiskBadge"></div>
                    <div class="ai-suggestion" id="aiSuggestion"></div>
                    <div class="ai-details">
                        <div class="ai-detail-item">
                            <strong>预算分析:</strong>
                            <span id="aiBudget"></span>
                        </div>
                        <div class="ai-detail-item">
                            <strong>合规检查:</strong>
                            <span id="aiCompliance"></span>
                        </div>
                        <div class="ai-detail-item">
                            <strong>风险点:</strong>
                            <span id="aiRiskPoints"></span>
                        </div>
                        <div class="ai-detail-item">
                            <strong>改进建议:</strong>
                            <span id="aiSuggestions"></span>
                        </div>
                    </div>
                    <p class="ai-note">💡 以上为AI辅助分析结果，最终决策以人工审批为准</p>
                </div>
            </section>

            <!-- 待审批列表 -->
            <section id="section-pending" class="section" style="display:none">
                <div class="card">
                    <h3>📋 待审批申请</h3>
                    <div id="pendingList" class="list-container">
                        <p class="empty-hint">暂无待审批申请</p>
                    </div>
                </div>
            </section>

            <!-- 我的申请 -->
            <section id="section-myRequests" class="section" style="display:none">
                <div class="card">
                    <h3>📂 我的申请记录</h3>
                    <div id="myRequestList" class="list-container">
                        <p class="empty-hint">暂无申请记录</p>
                    </div>
                </div>
            </section>

            <!-- 申请详情弹窗 -->
            <div id="detailModal" class="modal" style="display:none">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>审批详情</h3>
                        <button class="btn-close" onclick="closeModal()">✕</button>
                    </div>
                    <div id="detailContent"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
